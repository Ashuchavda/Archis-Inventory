<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archis – Warehouse Inventory</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;font-size:14px;background:#f4f6f9;color:#1a1a2e}
.header{background:linear-gradient(135deg,#0a1628 0%,#1a2f5e 60%,#1565c0 100%);padding:14px 24px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 12px rgba(0,0,0,0.3)}
.header img{height:44px;object-fit:contain}
.header-title{color:#fff;font-size:15px;font-weight:400;opacity:0.75;border-left:1px solid rgba(255,255,255,0.25);padding-left:16px;margin-left:4px}
.app{padding:1.25rem}
.tabs{display:flex;gap:4px;background:#e8edf5;border-radius:8px;padding:3px;margin-bottom:1.25rem;width:fit-content}
.tab{padding:7px 18px;border-radius:6px;border:none;background:transparent;cursor:pointer;font-size:13px;color:#555;font-family:'Segoe UI',sans-serif}
.tab.active{background:#fff;color:#1565c0;font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,0.1)}
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:1.25rem}
.stat{background:#fff;border-radius:10px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,0.07)}
.stat .lbl{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px}
.stat .val{font-size:26px;font-weight:700}
.stat .val.green{color:#1D9E75}
.stat .val.red{color:#e53935}
.stat .val.amber{color:#f57c00}
.stat .val.blue{color:#1565c0}
.toolbar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.toolbar input,.toolbar select{flex:1;min-width:130px;height:36px;padding:0 12px;border:1px solid #dde3ee;border-radius:8px;background:#fff;color:#1a1a2e;font-size:13px;font-family:'Segoe UI',sans-serif}
.btn{height:36px;padding:0 16px;border:1px solid #dde3ee;border-radius:8px;background:#fff;color:#1a1a2e;cursor:pointer;font-size:13px;font-family:'Segoe UI',sans-serif;white-space:nowrap}
.btn.primary{background:linear-gradient(135deg,#1565c0,#1976d2);color:#fff;border:none;font-weight:600}
.btn:hover{background:#f0f4ff;border-color:#90b0e0}
.btn.primary:hover{background:linear-gradient(135deg,#0d47a1,#1565c0)}
.panel{background:#fff;border-radius:12px;padding:1.25rem;margin-bottom:1rem;box-shadow:0 1px 4px rgba(0,0,0,0.07)}
.panel h2{font-size:15px;font-weight:600;color:#1a2f5e;margin-bottom:1rem}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 12px;font-weight:600;color:#888;border-bottom:2px solid #f0f4ff;font-size:11px;text-transform:uppercase;letter-spacing:0.4px}
td{padding:9px 12px;border-bottom:1px solid #f4f6f9;color:#1a1a2e}
tr:hover td{background:#f8faff}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge.in{background:#e8f5e9;color:#2e7d32}
.badge.low{background:#fff3e0;color:#e65100}
.badge.out{background:#ffebee;color:#c62828}
.badge.assigned{background:#e3f2fd;color:#1565c0}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:12px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:0.4px}
.form-group input,.form-group select{height:36px;padding:0 12px;border:1px solid #dde3ee;border-radius:8px;background:#fff;color:#1a1a2e;font-size:13px;font-family:'Segoe UI',sans-serif}
.form-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}
.section{display:none}
.section.active{display:block}
.assign-card{background:#f8faff;border:1px solid #e3ecf8;border-radius:10px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.assign-card .name{font-weight:600;font-size:13px;color:#1a2f5e}
.assign-card .meta{font-size:12px;color:#888;margin-top:2px}
.empty{text-align:center;padding:2.5rem;color:#aaa;font-size:13px}
.toast{position:fixed;bottom:24px;right:24px;background:#1565c0;color:#fff;padding:11px 20px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;box-shadow:0 4px 16px rgba(21,101,192,0.4)}
.toast.show{opacity:1}
</style>
</head>

AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAf/9k=" alt="Archis Logo">
  <span class="header-title">Warehouse Inventory Management</span>

<div class="app">
  <div class="tabs">
    <button class="tab active" onclick="showTab('inventory')">Inventory</button>
    <button class="tab" onclick="showTab('assign')">Assign</button>
    <button class="tab" onclick="showTab('add')">Add Item</button>
    <button class="tab" onclick="showTab('report')">Report</button>
  </div>

  <div class="stats" id="stats"></div>

  <div class="section active" id="sec-inventory">
    <div class="toolbar">
      <input type="text" id="search" placeholder="Search item name or SKU..." oninput="renderTable()">
      <select id="filterCat" onchange="renderTable()">
        <option value="">All Categories</option>
        <option>Electronics</option><option>Tools</option>
        <option>Furniture</option><option>Stationery</option><option>Other</option>
      </select>
      <select id="filterStatus" onchange="renderTable()">
        <option value="">All Status</option>
        <option>In Stock</option><option>Low Stock</option>
        <option>Out of Stock</option><option>Assigned</option>
      </select>
      <button class="btn" onclick="exportCSV()">Export CSV</button>
    </div>
    <div class="panel" style="padding:0;overflow:auto">
      <table>
        <thead><tr>
          <th>SKU</th><th>Item Name</th><th>Category</th>
          <th>Qty</th><th>Min Stock</th><th>Location</th><th>Status</th><th>Actions</th>
        </tr></thead>
        <tbody id="tbl"></tbody>
      </table>
    </div>
  </div>

  <div class="section" id="sec-assign">
    <div class="panel">
      <h2>Assign Stock to Person / Department</h2>
      <div class="form-grid">
        <div class="form-group"><label>Select Item</label><select id="assignItem"></select></div>
        <div class="form-group"><label>Assign To</label><input type="text" id="assignTo" placeholder="Name or Department"></div>
        <div class="form-group"><label>Quantity</label><input type="number" id="assignQty" min="1" value="1"></div>
        <div class="form-group"><label>Note (optional)</label><input type="text" id="assignNote" placeholder="Purpose or remarks"></div>
      </div>
      <div class="form-actions"><button class="btn primary" onclick="doAssign()">Assign Stock</button></div>
    </div>
    <div class="panel">
      <h2>Assignment History</h2>
      <div id="assignList"><div class="empty">No assignments yet.</div></div>
    </div>
  </div>

  <div class="section" id="sec-add">
    <div class="panel">
      <h2>Add New Item</h2>
      <div class="form-grid">
        <div class="form-group"><label>Item Name *</label><input type="text" id="newName" placeholder="e.g. Office Chair"></div>
        <div class="form-group"><label>SKU</label><input type="text" id="newSKU" placeholder="Auto-generated if empty"></div>
        <div class="form-group"><label>Category</label>
          <select id="newCat"><option>Electronics</option><option>Tools</option><option>Furniture</option><option>Stationery</option><option>Other</option></select>
        </div>
        <div class="form-group"><label>Quantity</label><input type="number" id="newQty" min="0" value="0"></div>
        <div class="form-group"><label>Min Stock Alert</label><input type="number" id="newMin" min="0" value="5"></div>
        <div class="form-group"><label>Location / Shelf</label><input type="text" id="newLoc" placeholder="e.g. A-12"></div>
      </div>
      <div class="form-actions">
        <button class="btn" onclick="clearForm()">Clear</button>
        <button class="btn primary" onclick="addItem()">Add to Inventory</button>
      </div>
    </div>
  </div>

  <div class="section" id="sec-report">
    <div class="panel"><h2>Stock Report Summary</h2><div id="reportContent"></div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let items=[
  {id:1,sku:'SKU-001',name:'Laptop Dell 15"',cat:'Electronics',qty:12,min:5,loc:'A-01',status:'In Stock'},
  {id:2,sku:'SKU-002',name:'Wireless Mouse',cat:'Electronics',qty:3,min:10,loc:'A-02',status:'Low Stock'},
  {id:3,sku:'SKU-003',name:'Office Chair',cat:'Furniture',qty:0,min:2,loc:'B-05',status:'Out of Stock'},
  {id:4,sku:'SKU-004',name:'Drill Machine',cat:'Tools',qty:7,min:3,loc:'C-11',status:'In Stock'},
  {id:5,sku:'SKU-005',name:'A4 Paper (Ream)',cat:'Stationery',qty:50,min:20,loc:'D-01',status:'In Stock'},
  {id:6,sku:'SKU-006',name:'HDMI Cable',cat:'Electronics',qty:15,min:5,loc:'A-03',status:'Assigned'},
  {id:7,sku:'SKU-007',name:'Hammer',cat:'Tools',qty:4,min:5,loc:'C-02',status:'Low Stock'},
  {id:8,sku:'SKU-008',name:'Standing Desk',cat:'Furniture',qty:2,min:1,loc:'B-10',status:'In Stock'},
];
let assignments=[];
let nextId=9;

function getStatus(qty,min){
  if(qty===0)return'Out of Stock';
  if(qty<=min)return'Low Stock';
  return'In Stock';
}
function renderStats(){
  const inStock=items.filter(i=>i.status==='In Stock').length;
  const low=items.filter(i=>i.status==='Low Stock').length;
  const out=items.filter(i=>i.status==='Out of Stock').length;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="lbl">Total Items</div><div class="val blue">${items.length}</div></div>
    <div class="stat"><div class="lbl">In Stock</div><div class="val green">${inStock}</div></div>
    <div class="stat"><div class="lbl">Low Stock</div><div class="val amber">${low}</div></div>
    <div class="stat"><div class="lbl">Out of Stock</div><div class="val red">${out}</div></div>`;
}
function renderTable(){
  const q=document.getElementById('search').value.toLowerCase();
  const cat=document.getElementById('filterCat').value;
  const st=document.getElementById('filterStatus').value;
  let filtered=items.filter(i=>
    (!q||i.name.toLowerCase().includes(q)||i.sku.toLowerCase().includes(q))&&
    (!cat||i.cat===cat)&&(!st||i.status===st));
  const tbody=document.getElementById('tbl');
  if(!filtered.length){tbody.innerHTML='<tr><td colspan="8" style="text-align:center;padding:2rem;color:#aaa">No items found.</td></tr>';return;}
  tbody.innerHTML=filtered.map(i=>{
    const b=i.status==='In Stock'?'in':i.status==='Low Stock'?'low':i.status==='Assigned'?'assigned':'out';
    return`<tr>
      <td style="font-family:monospace;font-size:12px;color:#888">${i.sku}</td>
      <td style="font-weight:600">${i.name}</td>
      <td>${i.cat}</td><td>${i.qty}</td><td>${i.min}</td><td>${i.loc||'-'}</td>
      <td><span class="badge ${b}">${i.status}</span></td>
      <td style="display:flex;gap:4px">
        <button class="btn" style="height:28px;padding:0 10px;font-size:12px" onclick="adjustQty(${i.id},1)">+</button>
        <button class="btn" style="height:28px;padding:0 10px;font-size:12px" onclick="adjustQty(${i.id},-1)">−</button>
        <button class="btn" style="height:28px;padding:0 10px;font-size:12px;color:#e53935" onclick="deleteItem(${i.id})">Del</button>
      </td></tr>`;
  }).join('');
}
function adjustQty(id,delta){
  const item=items.find(i=>i.id===id);if(!item)return;
  item.qty=Math.max(0,item.qty+delta);
  if(item.status!=='Assigned')item.status=getStatus(item.qty,item.min);
  renderTable();renderStats();renderReport();
}
function deleteItem(id){
  items=items.filter(i=>i.id!==id);
  renderTable();renderStats();renderReport();populateAssignSelect();showToast('Item removed.');
}
function addItem(){
  const name=document.getElementById('newName').value.trim();
  if(!name){alert('Item name is required.');return;}
  const sku=document.getElementById('newSKU').value.trim()||'SKU-'+String(nextId).padStart(3,'0');
  const qty=parseInt(document.getElementById('newQty').value)||0;
  const min=parseInt(document.getElementById('newMin').value)||5;
  items.push({id:nextId++,sku,name,cat:document.getElementById('newCat').value,qty,min,
    loc:document.getElementById('newLoc').value.trim(),status:getStatus(qty,min)});
  renderTable();renderStats();renderReport();populateAssignSelect();
  clearForm();showToast('Item added!');showTab('inventory');
}
function clearForm(){
  ['newName','newSKU','newLoc'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('newQty').value=0;document.getElementById('newMin').value=5;
}
function populateAssignSelect(){
  document.getElementById('assignItem').innerHTML=
    items.filter(i=>i.qty>0).map(i=>`<option value="${i.id}">${i.name} (Qty: ${i.qty})</option>`).join('');
}
function doAssign(){
  const id=parseInt(document.getElementById('assignItem').value);
  const to=document.getElementById('assignTo').value.trim();
  const qty=parseInt(document.getElementById('assignQty').value)||1;
  const note=document.getElementById('assignNote').value.trim();
  if(!to){alert('Please enter who to assign to.');return;}
  const item=items.find(i=>i.id===id);
  if(!item||item.qty<qty){alert('Not enough stock.');return;}
  item.qty-=qty;item.status=getStatus(item.qty,item.min);
  assignments.unshift({item:item.name,to,qty,note,date:new Date().toLocaleDateString()});
  renderAssignments();populateAssignSelect();renderTable();renderStats();
  document.getElementById('assignTo').value='';
  document.getElementById('assignQty').value=1;
  document.getElementById('assignNote').value='';
  showToast('Stock assigned!');
}
function renderAssignments(){
  const list=document.getElementById('assignList');
  if(!assignments.length){list.innerHTML='<div class="empty">No assignments yet.</div>';return;}
  list.innerHTML=assignments.map(a=>`
    <div class="assign-card">
      <div><div class="name">${a.item}</div>
      <div class="meta">To: <b>${a.to}</b> &nbsp;|&nbsp; Qty: ${a.qty} &nbsp;|&nbsp; ${a.date}${a.note?` &nbsp;|&nbsp; ${a.note}`:''}</div></div>
      <span class="badge assigned">Assigned</span>
    </div>`).join('');
}
function renderReport(){
  const low=items.filter(i=>i.status==='Low Stock');
  const out=items.filter(i=>i.status==='Out of Stock');
  const totalQty=items.reduce((s,i)=>s+i.qty,0);
  document.getElementById('reportContent').innerHTML=`
    <div class="stats" style="margin-bottom:1rem">
      <div class="stat"><div class="lbl">Total SKUs</div><div class="val blue">${items.length}</div></div>
      <div class="stat"><div class="lbl">Total Units</div><div class="val blue">${totalQty}</div></div>
      <div class="stat"><div class="lbl">Assignments</div><div class="val green">${assignments.length}</div></div>
      <div class="stat"><div class="lbl">Alerts</div><div class="val red">${low.length+out.length}</div></div>
    </div>
    ${low.length?`<div style="margin-bottom:10px"><b style="color:#e65100;font-size:13px">Low Stock Alerts</b>
    <div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:6px">${low.map(i=>`<span class="badge low">${i.name} (${i.qty})</span>`).join('')}</div></div>`:''}
    ${out.length?`<div><b style="color:#c62828;font-size:13px">Out of Stock</b>
    <div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:6px">${out.map(i=>`<span class="badge out">${i.name}</span>`).join('')}</div></div>`:''}
    ${!low.length&&!out.length?'<div style="color:#2e7d32;font-weight:600">All items are sufficiently stocked.</div>':''}`;
}
function exportCSV(){
  const rows=[['SKU','Name','Category','Qty','Min Stock','Location','Status'],
    ...items.map(i=>[i.sku,i.name,i.cat,i.qty,i.min,i.loc,i.status])];
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(rows.map(r=>r.join(',')).join('\n'));
  a.download='archis-inventory.csv';a.click();showToast('CSV exported!');
}
function showTab(tab){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('sec-'+tab).classList.add('active');
  ['inventory','assign','add','report'].forEach((t,i)=>{
    if(t===tab)document.querySelectorAll('.tab')[i].classList.add('active');
  });
  if(tab==='assign')populateAssignSelect();
  if(tab==='report')renderReport();
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);
}
renderStats();renderTable();renderReport();
</script>
</body>
